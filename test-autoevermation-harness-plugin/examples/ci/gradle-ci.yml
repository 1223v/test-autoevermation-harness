# GitHub Actions CI — Gradle + Spring Boot 4.1.0 + Java 17
#
# Secret scanning은 GitHub 저장소 설정(Settings > Security > Secret scanning)에서
# 활성화하는 저장소 기능이다. 이 워크플로에 secret scanning 스텝을 추가하지 않는다.
# CI secrets은 Actions Secrets(Settings > Secrets and variables > Actions)에만 저장하고
# 로그에 절대 출력하지 않는다.

name: CI (Gradle)

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

# 최소 권한 원칙: 기본적으로 읽기만 허용
permissions:
  contents: read
  # SARIF 업로드에 필요한 권한 (코드 스캐닝 결과 게시)
  security-events: write
  # PR 체크 상태 게시에 필요
  checks: write

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17 (Temurin) with Gradle cache
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
          # Gradle 의존성 캐시 키를 build 파일 기준으로 고정
          cache-dependency-path: |
            build.gradle.kts
            gradle/libs.versions.toml

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3

      # check = test + jacocoTestReport + jacocoTestCoverageVerification
      # near-100% 게이트 미달 시 빌드 실패 (RESEARCH_NOTES §3·§6)
      - name: Run tests + coverage gate
        run: ./gradlew check --no-daemon --continue
        env:
          # 타임존 고정: 날짜 의존 flaky 방지
          TZ: UTC

      # 선택 기능: 저장소 변수 RUN_PITEST=true인 PR에서만 실행한다.
      # mutation.enabled=false(기본)인 저장소는 변수를 만들지 않아도 된다.
      - name: Mutation testing (PITest)
        if: github.event_name == 'pull_request' && vars.RUN_PITEST == 'true'
        run: ./gradlew pitest --no-daemon

      - name: Upload test reports (항상 업로드 — 실패 시 디버깅용)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-gradle
          path: |
            build/test-results/test/
            build/reports/tests/test/
          retention-days: 14

      - name: Upload coverage report (JaCoCo)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-gradle
          path: |
            build/reports/jacoco/test/
          retention-days: 14

      - name: Upload mutation report (PITest)
        if: always() && hashFiles('build/reports/pitest/**') != ''
        uses: actions/upload-artifact@v4
        with:
          name: pitest-mutation-gradle
          path: build/reports/pitest/
          retention-days: 14

      # SARIF 파일이 존재할 때만 업로드 (SpotBugs/ErrorProne 등 정적 분석 도구 연동 시)
      - name: Upload SARIF to GitHub Code Scanning
        if: always() && hashFiles('build/reports/sarif/*.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: build/reports/sarif/
          # category를 지정하면 여러 도구의 결과를 구분할 수 있다
          category: static-analysis
